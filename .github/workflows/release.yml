name: MiniMart POS – Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  # ── Build debug APK on every PR ──────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ── Signed release on version tags ───────────────────────────────────────────
  release:
    name: Release Signed APK + AAB
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Decode keystore from base64 secret
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/minimart-release.jks

      # Build signed release APK
      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          SIGNING_KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      # Build signed release AAB (for Play Store)
      - name: Build signed release AAB
        run: ./gradlew bundleRelease --no-daemon
        env:
          SIGNING_KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      # Extract version name from tag
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # Create GitHub Release and attach both artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name:     "MiniMart POS ${{ steps.version.outputs.VERSION }}"
          body: |
            ## MiniMart POS ${{ steps.version.outputs.VERSION }}
            
            ### What's included
            - `minimart-pos-${{ steps.version.outputs.VERSION }}.apk` — direct install APK
            - `minimart-pos-${{ steps.version.outputs.VERSION }}.aab` — Google Play Bundle
            
            ### Install (direct APK)
            1. Enable "Install from unknown sources" on the device
            2. Transfer and open the `.apk` file
            
            ### Default credentials
            - Username: `admin`
            - PIN: `1234` ← **change immediately after first login**
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Clean up keystore
      - name: Clean up keystore
        if: always()
        run: rm -f app/minimart-release.jks
