name: MiniMart POS – Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.7'

jobs:
  release:
    name: Release Signed APK + AAB
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore app/minimart-release.jks \
            -alias minimart \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=MiniMart POS,OU=Mobile,O=MiniMart,L=Mombasa,ST=Coast,C=KE"
          ls -lh app/minimart-release.jks

      - name: Build signed release APK
        env:
          SIGNING_KEY_ALIAS: minimart
          SIGNING_KEY_PASSWORD: android
          SIGNING_STORE_PASSWORD: android
        run: gradle assembleRelease --no-daemon

      - name: Build signed release AAB
        env:
          SIGNING_KEY_ALIAS: minimart
          SIGNING_KEY_PASSWORD: android
          SIGNING_STORE_PASSWORD: android
        run: gradle bundleRelease --no-daemon

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "MiniMart POS ${{ steps.version.outputs.VERSION }}"
          body: |
            ## MiniMart POS ${{ steps.version.outputs.VERSION }}
            - arm64-v8a signed APK (direct sideload)
            - AAB for Google Play
            Default login: username `admin` | PIN `1234`
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: rm -f app/minimart-release.jks
